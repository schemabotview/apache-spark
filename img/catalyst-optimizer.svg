<svg viewBox="0 0 300 370" width="300" height="370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* ── Light ──────────────────────────────────────── */
      .bg          { fill: #f9f9f8; }

      /* Boxes */
      .box-code    { fill: #f3f3f0; stroke: #d1d1cb; }
      .box-unres   { fill: #fefce8; stroke: #fde047; }
      .box-ana     { fill: #ffedd5; stroke: #fdba74; }
      .box-opt     { fill: #d1fae5; stroke: #6ee7b7; }
      .box-phys    { fill: #eeeeff; stroke: #818cf8; }
      .box-exec    { fill: #dbeafe; stroke: #93c5fd; }

      /* Text */
      .t-code  { fill: #1a1a18; }
      .t-unres { fill: #713f12; }
      .t-ana   { fill: #c2410c; }
      .t-opt   { fill: #065f46; }
      .t-phys  { fill: #3730a3; }
      .t-exec  { fill: #1e40af; }

      /* Step labels between boxes */
      .step    { fill: #9b9b92; }

      /* Arrow */
      .arr     { stroke: #9b9b92; fill: none; }
      .arr-head{ fill: #9b9b92; }

      .label   { font-family: system-ui, sans-serif; }

      /* ── Dark ───────────────────────────────────────── */
      @media (prefers-color-scheme: dark) {
        .bg          { fill: #222220; }

        .box-code    { fill: #2a2a27; stroke: #484844; }
        .box-unres   { fill: #1c1a05; stroke: #ca8a04; }
        .box-ana     { fill: #431407; stroke: #f97316; }
        .box-opt     { fill: #052e16; stroke: #22c55e; }
        .box-phys    { fill: #1e1b4b; stroke: #818cf8; }
        .box-exec    { fill: #1e3a5f; stroke: #3b82f6; }

        .t-code  { fill: #f0f0ec; }
        .t-unres { fill: #fef08a; }
        .t-ana   { fill: #fed7aa; }
        .t-opt   { fill: #bbf7d0; }
        .t-phys  { fill: #c7d2fe; }
        .t-exec  { fill: #93c5fd; }

        .step    { fill: #6b6b65; }
        .arr     { stroke: #6b6b65; fill: none; }
        .arr-head{ fill: #6b6b65; }
      }
    </style>
    <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" class="arr-head"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="300" height="370" rx="10" class="bg" stroke="none"/>

  <!-- Box 1: Your Code -->
  <rect x="75" y="10" width="150" height="36" rx="6" class="box-code" stroke-width="1.5"/>
  <text x="150" y="33" font-size="11" font-weight="700" text-anchor="middle" class="label t-code">Your Code</text>

  <!-- Arrow + step label -->
  <line x1="150" y1="46" x2="150" y2="64" stroke-width="1.3" class="arr" marker-end="url(#arrowhead)"/>
  <text x="156" y="58" font-size="8" class="label step">parse &amp; resolve names/types</text>

  <!-- Box 2: Unresolved Logical Plan -->
  <rect x="50" y="68" width="200" height="36" rx="6" class="box-unres" stroke-width="1.5"/>
  <text x="150" y="83" font-size="10" font-weight="700" text-anchor="middle" class="label t-unres">Unresolved</text>
  <text x="150" y="97" font-size="10" font-weight="700" text-anchor="middle" class="label t-unres">Logical Plan</text>

  <!-- Arrow -->
  <line x1="150" y1="104" x2="150" y2="122" stroke-width="1.3" class="arr" marker-end="url(#arrowhead)"/>
  <text x="156" y="116" font-size="8" class="label step">bind to catalog &amp; schema</text>

  <!-- Box 3: Analyzed Logical Plan -->
  <rect x="50" y="126" width="200" height="36" rx="6" class="box-ana" stroke-width="1.5"/>
  <text x="150" y="141" font-size="10" font-weight="700" text-anchor="middle" class="label t-ana">Analyzed</text>
  <text x="150" y="155" font-size="10" font-weight="700" text-anchor="middle" class="label t-ana">Logical Plan</text>

  <!-- Arrow -->
  <line x1="150" y1="162" x2="150" y2="180" stroke-width="1.3" class="arr" marker-end="url(#arrowhead)"/>
  <text x="156" y="174" font-size="8" class="label step">Catalyst: push filters, reorder joins</text>

  <!-- Box 4: Optimized Logical Plan -->
  <rect x="50" y="184" width="200" height="36" rx="6" class="box-opt" stroke-width="1.5"/>
  <text x="150" y="199" font-size="10" font-weight="700" text-anchor="middle" class="label t-opt">Optimized</text>
  <text x="150" y="213" font-size="10" font-weight="700" text-anchor="middle" class="label t-opt">Logical Plan</text>

  <!-- Arrow -->
  <line x1="150" y1="220" x2="150" y2="238" stroke-width="1.3" class="arr" marker-end="url(#arrowhead)"/>
  <text x="156" y="232" font-size="8" class="label step">select physical operators</text>

  <!-- Box 5: Physical Plan -->
  <rect x="50" y="242" width="200" height="36" rx="6" class="box-phys" stroke-width="1.5"/>
  <text x="150" y="257" font-size="10" font-weight="700" text-anchor="middle" class="label t-phys">Physical Plan</text>
  <text x="150" y="271" font-size="9" text-anchor="middle" class="label t-phys">cost-based selection</text>

  <!-- Arrow -->
  <line x1="150" y1="278" x2="150" y2="296" stroke-width="1.3" class="arr" marker-end="url(#arrowhead)"/>
  <text x="156" y="291" font-size="8" class="label step">Tungsten codegen &amp; dispatch</text>

  <!-- Box 6: Execute on cluster -->
  <rect x="50" y="300" width="200" height="36" rx="6" class="box-exec" stroke-width="1.5"/>
  <text x="150" y="315" font-size="10" font-weight="700" text-anchor="middle" class="label t-exec">Execute on Cluster</text>
  <text x="150" y="329" font-size="9" text-anchor="middle" class="label t-exec">RDD tasks on executors</text>

  <!-- Footer -->
  <text x="150" y="358" font-size="8" text-anchor="middle" class="label step">Catalyst Optimizer Pipeline</text>
</svg>

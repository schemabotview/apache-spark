<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,monospace" font-size="12">
  <style>
    @media (prefers-color-scheme: dark) {
      text { fill: #cdd6f4; }
      .bg { fill: #1e1e2e; }
      .panel { fill: #313244; stroke: #585b70; }
      .small-tbl { fill: #1e3a5f; stroke: #89b4fa; }
      .large-tbl { fill: #2a3f2a; stroke: #a6e3a1; }
      .exec-box  { fill: #2d2030; stroke: #cba6f7; }
      .bcast-arrow { stroke: #89b4fa; }
      .merge-arrow { stroke: #f38ba8; }
      .badge-blue { fill: #89b4fa; }
      .badge-green { fill: #a6e3a1; }
      .badge-purple { fill: #cba6f7; }
      .badge-red { fill: #f38ba8; }
      .dim { fill: #6c7086; }
      .divider { stroke: #45475a; }
      .join-result { fill: #2a3a2a; stroke: #a6e3a1; }
    }
    @media (prefers-color-scheme: light) {
      text { fill: #1c1c2e; }
      .bg { fill: #f8f9fa; }
      .panel { fill: #ffffff; stroke: #dee2e6; }
      .small-tbl { fill: #dbeafe; stroke: #3b82f6; }
      .large-tbl { fill: #dcfce7; stroke: #16a34a; }
      .exec-box  { fill: #f3e8ff; stroke: #9333ea; }
      .bcast-arrow { stroke: #3b82f6; }
      .merge-arrow { stroke: #dc2626; }
      .badge-blue { fill: #3b82f6; }
      .badge-green { fill: #16a34a; }
      .badge-purple { fill: #9333ea; }
      .badge-red { fill: #dc2626; }
      .dim { fill: #9ca3af; }
      .divider { stroke: #e5e7eb; }
      .join-result { fill: #f0fdf4; stroke: #16a34a; }
    }
  </style>

  <defs>
    <marker id="blue-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" class="badge-blue"/>
    </marker>
    <marker id="red-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" class="badge-red"/>
    </marker>
    <marker id="green-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" class="badge-green"/>
    </marker>
  </defs>

  <rect width="800" height="360" class="bg" rx="12"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700">Broadcast Hash Join vs Sort-Merge Join</text>

  <!-- ══ LEFT PANEL — Broadcast Hash Join ══ -->
  <rect x="16" y="42" width="370" height="304" rx="8" class="panel" stroke-width="1.5"/>
  <text x="201" y="62" text-anchor="middle" font-size="13" font-weight="700">Broadcast Hash Join</text>
  <text x="201" y="78" text-anchor="middle" font-size="11" class="dim">small table → broadcast to every executor</text>

  <!-- Small table (customers) at top centre -->
  <rect x="148" y="88" width="106" height="38" rx="6" class="small-tbl" stroke-width="1.5"/>
  <text x="201" y="104" text-anchor="middle" font-size="11" font-weight="600">customers</text>
  <text x="201" y="119" text-anchor="middle" font-size="10" class="dim">small — 10 MB</text>

  <!-- broadcast arrows to three executors -->
  <line x1="165" y1="126" x2="80"  y2="168" class="bcast-arrow" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#blue-arrow)"/>
  <line x1="201" y1="126" x2="201" y2="168" class="bcast-arrow" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#blue-arrow)"/>
  <line x1="237" y1="126" x2="322" y2="168" class="bcast-arrow" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#blue-arrow)"/>

  <!-- Executor 1 -->
  <rect x="28" y="168" width="104" height="68" rx="6" class="exec-box" stroke-width="1.2"/>
  <text x="80" y="184" text-anchor="middle" font-size="10" font-weight="600">Executor 1</text>
  <rect x="36" y="190" width="88" height="16" rx="3" class="large-tbl" stroke-width="1"/>
  <text x="80" y="202" text-anchor="middle" font-size="9">txns partition 1</text>
  <rect x="36" y="210" width="88" height="16" rx="3" class="small-tbl" stroke-width="1"/>
  <text x="80" y="222" text-anchor="middle" font-size="9">customers copy</text>

  <!-- Executor 2 -->
  <rect x="148" y="168" width="104" height="68" rx="6" class="exec-box" stroke-width="1.2"/>
  <text x="200" y="184" text-anchor="middle" font-size="10" font-weight="600">Executor 2</text>
  <rect x="156" y="190" width="88" height="16" rx="3" class="large-tbl" stroke-width="1"/>
  <text x="200" y="202" text-anchor="middle" font-size="9">txns partition 2</text>
  <rect x="156" y="210" width="88" height="16" rx="3" class="small-tbl" stroke-width="1"/>
  <text x="200" y="222" text-anchor="middle" font-size="9">customers copy</text>

  <!-- Executor 3 -->
  <rect x="268" y="168" width="104" height="68" rx="6" class="exec-box" stroke-width="1.2"/>
  <text x="320" y="184" text-anchor="middle" font-size="10" font-weight="600">Executor 3</text>
  <rect x="276" y="190" width="88" height="16" rx="3" class="large-tbl" stroke-width="1"/>
  <text x="320" y="202" text-anchor="middle" font-size="9">txns partition 3</text>
  <rect x="276" y="210" width="88" height="16" rx="3" class="small-tbl" stroke-width="1"/>
  <text x="320" y="222" text-anchor="middle" font-size="9">customers copy</text>

  <!-- local join arrows -->
  <line x1="80"  y1="236" x2="80"  y2="262" class="bcast-arrow" stroke-width="1.5" marker-end="url(#green-arrow)"/>
  <line x1="200" y1="236" x2="200" y2="262" class="bcast-arrow" stroke-width="1.5" marker-end="url(#green-arrow)"/>
  <line x1="320" y1="236" x2="320" y2="262" class="bcast-arrow" stroke-width="1.5" marker-end="url(#green-arrow)"/>

  <!-- Result boxes -->
  <rect x="36"  y="262" width="88" height="24" rx="4" class="join-result" stroke-width="1"/>
  <text x="80"  y="278" text-anchor="middle" font-size="9">joined result 1</text>
  <rect x="156" y="262" width="88" height="24" rx="4" class="join-result" stroke-width="1"/>
  <text x="200" y="278" text-anchor="middle" font-size="9">joined result 2</text>
  <rect x="276" y="262" width="88" height="24" rx="4" class="join-result" stroke-width="1"/>
  <text x="320" y="278" text-anchor="middle" font-size="9">joined result 3</text>

  <!-- No shuffle badge -->
  <rect x="100" y="298" width="202" height="26" rx="13" class="badge-green" opacity="0.9"/>
  <text x="201" y="315" text-anchor="middle" font-size="11" font-weight="700" fill="white">No Shuffle — Fast</text>

  <!-- ══ DIVIDER ══ -->
  <line x1="400" y1="42" x2="400" y2="346" class="divider" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ══ RIGHT PANEL — Sort-Merge Join ══ -->
  <rect x="414" y="42" width="370" height="304" rx="8" class="panel" stroke-width="1.5"/>
  <text x="599" y="62" text-anchor="middle" font-size="13" font-weight="700">Sort-Merge Join</text>
  <text x="599" y="78" text-anchor="middle" font-size="11" class="dim">both sides shuffled by join key</text>

  <!-- Left side partitions -->
  <rect x="428" y="90" width="100" height="22" rx="4" class="large-tbl" stroke-width="1"/>
  <text x="478" y="105" text-anchor="middle" font-size="9">card_txns P0</text>
  <rect x="428" y="118" width="100" height="22" rx="4" class="large-tbl" stroke-width="1"/>
  <text x="478" y="133" text-anchor="middle" font-size="9">card_txns P1</text>
  <rect x="428" y="146" width="100" height="22" rx="4" class="large-tbl" stroke-width="1"/>
  <text x="478" y="161" text-anchor="middle" font-size="9">card_txns P2</text>

  <!-- Right side partitions -->
  <rect x="650" y="90" width="100" height="22" rx="4" class="small-tbl" stroke-width="1"/>
  <text x="700" y="105" text-anchor="middle" font-size="9">loan_accts P0</text>
  <rect x="650" y="118" width="100" height="22" rx="4" class="small-tbl" stroke-width="1"/>
  <text x="700" y="133" text-anchor="middle" font-size="9">loan_accts P1</text>
  <rect x="650" y="146" width="100" height="22" rx="4" class="small-tbl" stroke-width="1"/>
  <text x="700" y="161" text-anchor="middle" font-size="9">loan_accts P2</text>

  <!-- Shuffle arrows — all-to-all -->
  <line x1="528" y1="100" x2="575" y2="196" class="merge-arrow" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#red-arrow)" opacity="0.7"/>
  <line x1="528" y1="128" x2="575" y2="210" class="merge-arrow" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#red-arrow)" opacity="0.7"/>
  <line x1="528" y1="156" x2="575" y2="224" class="merge-arrow" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#red-arrow)" opacity="0.7"/>
  <line x1="649" y1="100" x2="622" y2="196" class="merge-arrow" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#red-arrow)" opacity="0.7"/>
  <line x1="649" y1="128" x2="622" y2="210" class="merge-arrow" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#red-arrow)" opacity="0.7"/>
  <line x1="649" y1="156" x2="622" y2="224" class="merge-arrow" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#red-arrow)" opacity="0.7"/>

  <!-- Exchange label -->
  <rect x="556" y="172" width="64" height="18" rx="4" class="badge-red" opacity="0.8"/>
  <text x="588" y="184" text-anchor="middle" font-size="9" font-weight="700" fill="white">Exchange</text>
  <rect x="556" y="196" width="64" height="18" rx="4" class="badge-red" opacity="0.8"/>
  <text x="588" y="208" text-anchor="middle" font-size="9" font-weight="700" fill="white">Exchange</text>
  <rect x="556" y="220" width="64" height="18" rx="4" class="badge-red" opacity="0.8"/>
  <text x="588" y="232" text-anchor="middle" font-size="9" font-weight="700" fill="white">Exchange</text>

  <!-- merged result boxes -->
  <rect x="460" y="258" width="276" height="24" rx="4" class="join-result" stroke-width="1"/>
  <text x="598" y="274" text-anchor="middle" font-size="9">sorted + merged output (new partitions)</text>

  <!-- Shuffle badge -->
  <rect x="496" y="298" width="205" height="26" rx="13" class="badge-red" opacity="0.85"/>
  <text x="599" y="315" text-anchor="middle" font-size="11" font-weight="700" fill="white">Full Shuffle — Expensive</text>
</svg>

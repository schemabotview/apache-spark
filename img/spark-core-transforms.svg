<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 230" width="580" height="230" font-family="system-ui, sans-serif">
  <defs>
    <style>
      .bg        { fill: #f9f9f8; }
      .df-fill   { fill: #1e40af; stroke: #3b82f6; stroke-width: 1.5; }
      .df-text   { fill: #ffffff; }
      .pipe      { stroke: #3b82f6; stroke-width: 2; stroke-dasharray: 4,3; fill: none; }
      .conn      { stroke: #9b9b92; stroke-width: 1; fill: none; }
      .lbl       { font-family: system-ui, sans-serif; }
      .muted     { fill: #9b9b92; }

      .t1-fill   { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.2; }
      .t1-text   { fill: #1e3a5f; }
      .t2-fill   { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.2; }
      .t2-text   { fill: #166534; }
      .t3-fill   { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.2; }
      .t3-text   { fill: #9a3412; }
      .t4-fill   { fill: #fdf4ff; stroke: #e879f9; stroke-width: 1.2; }
      .t4-text   { fill: #86198f; }
      .t5-fill   { fill: #f0fdfa; stroke: #5eead4; stroke-width: 1.2; }
      .t5-text   { fill: #134e4a; }
      .t6-fill   { fill: #fef9c3; stroke: #fde047; stroke-width: 1.2; }
      .t6-text   { fill: #713f12; }
      .noshuffle-fill { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .noshuffle-text { fill: #64748b; }

      @media (prefers-color-scheme: dark) {
        .bg        { fill: #222220; }
        .df-fill   { fill: #1e3a5f; stroke: #60a5fa; stroke-width: 1.5; }
        .df-text   { fill: #bfdbfe; }
        .pipe      { stroke: #3b82f6; }
        .conn      { stroke: #6b6b65; }
        .muted     { fill: #6b6b65; }

        .t1-fill   { fill: #172554; stroke: #3b82f6; }
        .t1-text   { fill: #93c5fd; }
        .t2-fill   { fill: #052e16; stroke: #16a34a; }
        .t2-text   { fill: #bbf7d0; }
        .t3-fill   { fill: #431407; stroke: #fb923c; }
        .t3-text   { fill: #fed7aa; }
        .t4-fill   { fill: #2e1065; stroke: #c026d3; }
        .t4-text   { fill: #f0abfc; }
        .t5-fill   { fill: #042f2e; stroke: #2dd4bf; }
        .t5-text   { fill: #99f6e4; }
        .t6-fill   { fill: #422006; stroke: #ca8a04; }
        .t6-text   { fill: #fde68a; }
        .noshuffle-fill { fill: #2a2a27; stroke: #484844; }
        .noshuffle-text { fill: #94a3b8; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="580" height="230" rx="8" class="bg"/>

  <!-- Title -->
  <text x="290" y="22" text-anchor="middle" font-size="11" class="lbl muted">Core Transformations — all narrow, no shuffle</text>

  <!-- ── Pipeline column ── -->
  <!-- Input DataFrame box -->
  <rect x="28" y="36" width="110" height="34" rx="6" class="df-fill"/>
  <text x="83" y="57" text-anchor="middle" font-size="11.5" font-weight="600" class="lbl df-text">Input DataFrame</text>

  <!-- Vertical dashed pipe -->
  <line x1="83" y1="70" x2="83" y2="160" class="pipe"/>

  <!-- Output DataFrame box -->
  <rect x="28" y="160" width="110" height="34" rx="6" class="df-fill"/>
  <text x="83" y="181" text-anchor="middle" font-size="11.5" font-weight="600" class="lbl df-text">Output DataFrame</text>

  <!-- ── Transform badges ── -->
  <!-- Badge layout: x=185, each badge ~32px tall, gap 6px, starting y=38 -->
  <!-- Connector dots on pipe at y=53,85,101,117,133,149 -->

  <!-- t1 — select / selectExpr -->
  <circle cx="83" cy="84" r="3" class="df-fill"/>
  <line x1="83" y1="84" x2="185" y2="51" class="conn"/>
  <rect x="185" y="38" width="178" height="26" rx="5" class="t1-fill"/>
  <text x="274" y="55" text-anchor="middle" font-size="10.5" font-weight="600" class="lbl t1-text">select / selectExpr</text>
  <text x="374" y="55" text-anchor="start" font-size="9.5" class="lbl t1-text">— pick columns</text>

  <!-- t2 — filter / where -->
  <circle cx="83" cy="97" r="3" class="df-fill"/>
  <line x1="83" y1="97" x2="185" y2="77" class="conn"/>
  <rect x="185" y="64" width="178" height="26" rx="5" class="t2-fill"/>
  <text x="274" y="81" text-anchor="middle" font-size="10.5" font-weight="600" class="lbl t2-text">filter / where</text>
  <text x="374" y="81" text-anchor="start" font-size="9.5" class="lbl t2-text">— keep matching rows</text>

  <!-- t3 — withColumn / drop -->
  <circle cx="83" cy="110" r="3" class="df-fill"/>
  <line x1="83" y1="110" x2="185" y2="103" class="conn"/>
  <rect x="185" y="90" width="178" height="26" rx="5" class="t3-fill"/>
  <text x="274" y="107" text-anchor="middle" font-size="10.5" font-weight="600" class="lbl t3-text">withColumn / drop</text>
  <text x="374" y="107" text-anchor="start" font-size="9.5" class="lbl t3-text">— add, replace, remove</text>

  <!-- t4 — cast -->
  <circle cx="83" cy="123" r="3" class="df-fill"/>
  <line x1="83" y1="123" x2="185" y2="129" class="conn"/>
  <rect x="185" y="116" width="178" height="26" rx="5" class="t4-fill"/>
  <text x="274" y="133" text-anchor="middle" font-size="10.5" font-weight="600" class="lbl t4-text">cast</text>
  <text x="374" y="133" text-anchor="start" font-size="9.5" class="lbl t4-text">— change column types</text>

  <!-- t5 — String &amp; numeric functions -->
  <circle cx="83" cy="136" r="3" class="df-fill"/>
  <line x1="83" y1="136" x2="185" y2="155" class="conn"/>
  <rect x="185" y="142" width="178" height="26" rx="5" class="t5-fill"/>
  <text x="274" y="159" text-anchor="middle" font-size="10.5" font-weight="600" class="lbl t5-text">String &amp; numeric functions</text>
  <text x="374" y="159" text-anchor="start" font-size="9.5" class="lbl t5-text">— upper, round, split…</text>

  <!-- t6 — when / otherwise -->
  <circle cx="83" cy="149" r="3" class="df-fill"/>
  <line x1="83" y1="149" x2="185" y2="181" class="conn"/>
  <rect x="185" y="168" width="178" height="26" rx="5" class="t6-fill"/>
  <text x="274" y="185" text-anchor="middle" font-size="10.5" font-weight="600" class="lbl t6-text">when / otherwise</text>
  <text x="374" y="185" text-anchor="start" font-size="9.5" class="lbl t6-text">— conditional values</text>

  <!-- No shuffle badge — bottom right -->
  <rect x="404" y="196" width="156" height="24" rx="5" class="noshuffle-fill"/>
  <text x="482" y="212" text-anchor="middle" font-size="10" class="lbl noshuffle-text">⬡ No shuffle · no stage boundary</text>
</svg>

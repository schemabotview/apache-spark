<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 210" width="580" height="210" role="img" aria-label="Spark UDF Performance Tiers">
  <defs>
    <style>
      .bg       { fill: #f9f9f8; }
      .t1-fill  { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.5; }
      .t1-text  { fill: #166534; }
      .t1-bar   { fill: #22c55e; }
      .t2-fill  { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; }
      .t2-text  { fill: #1e3a5f; }
      .t2-bar   { fill: #3b82f6; }
      .t3-fill  { fill: #fef2f2; stroke: #fca5a5; stroke-width: 1.5; }
      .t3-text  { fill: #991b1b; }
      .t3-bar   { fill: #ef4444; }
      .bar-bg   { fill: #e5e7eb; rx: 3; }
      .badge-fill { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .badge-text { fill: #475569; }
      .muted    { fill: #9b9b92; }
      .lbl      { font-family: system-ui, -apple-system, sans-serif; }

      @media (prefers-color-scheme: dark) {
        .bg       { fill: #222220; }
        .t1-fill  { fill: #052e16; stroke: #16a34a; stroke-width: 1.5; }
        .t1-text  { fill: #bbf7d0; }
        .t1-bar   { fill: #16a34a; }
        .t2-fill  { fill: #172554; stroke: #3b82f6; stroke-width: 1.5; }
        .t2-text  { fill: #93c5fd; }
        .t2-bar   { fill: #2563eb; }
        .t3-fill  { fill: #450a0a; stroke: #dc2626; stroke-width: 1.5; }
        .t3-text  { fill: #fca5a5; }
        .t3-bar   { fill: #dc2626; }
        .bar-bg   { fill: #374151; }
        .badge-fill { fill: #1e293b; stroke: #334155; stroke-width: 1; }
        .badge-text { fill: #94a3b8; }
        .muted    { fill: #6b6b65; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="580" height="210" rx="8" class="bg lbl"/>

  <!-- ── TIER 1 — Built-in SQL Functions ─────────────────────────────── -->
  <rect x="10" y="8" width="560" height="54" rx="6" class="t1-fill"/>

  <!-- Left labels -->
  <text x="18" y="27" class="lbl t1-text" font-size="12.5" font-weight="700">Built-in SQL Functions</text>
  <text x="18" y="41" class="lbl t1-text" font-size="10" opacity="0.85">pyspark.sql.functions — upper(), round(), datediff(), regexp_replace()…</text>

  <!-- Performance bar track -->
  <rect x="18" y="47" width="310" height="8" rx="4" class="bar-bg"/>
  <!-- Fill ~90% -->
  <rect x="18" y="47" width="279" height="8" rx="4" class="t1-bar"/>

  <!-- Right badge -->
  <rect x="340" y="13" width="222" height="28" rx="5" class="badge-fill"/>
  <text x="351" y="31" class="lbl badge-text" font-size="10.5" font-weight="600">Fastest — runs on JVM, no Python serialization</text>

  <!-- ── TIER 2 — Pandas UDF ─────────────────────────────────────────── -->
  <rect x="10" y="70" width="560" height="54" rx="6" class="t2-fill"/>

  <text x="18" y="89" class="lbl t2-text" font-size="12.5" font-weight="700">Pandas UDF (Vectorized)</text>
  <text x="18" y="103" class="lbl t2-text" font-size="10" opacity="0.85">@pandas_udf — processes batches as pandas Series via Apache Arrow</text>

  <rect x="18" y="109" width="310" height="8" rx="4" class="bar-bg"/>
  <!-- Fill ~60% -->
  <rect x="18" y="109" width="186" height="8" rx="4" class="t2-bar"/>

  <rect x="340" y="75" width="222" height="28" rx="5" class="badge-fill"/>
  <text x="351" y="93" class="lbl badge-text" font-size="10.5" font-weight="600">Fast — Arrow zero-copy transfer, vectorised ops</text>

  <!-- ── TIER 3 — Python UDF ─────────────────────────────────────────── -->
  <rect x="10" y="132" width="560" height="54" rx="6" class="t3-fill"/>

  <text x="18" y="151" class="lbl t3-text" font-size="12.5" font-weight="700">Python UDF</text>
  <text x="18" y="165" class="lbl t3-text" font-size="10" opacity="0.85">@udf — row-by-row Python serialization through the JVM boundary</text>

  <rect x="18" y="171" width="310" height="8" rx="4" class="bar-bg"/>
  <!-- Fill ~20% (slowest) -->
  <rect x="18" y="171" width="62" height="8" rx="4" class="t3-bar"/>

  <rect x="340" y="137" width="222" height="28" rx="5" class="badge-fill"/>
  <text x="351" y="155" class="lbl badge-text" font-size="10.5" font-weight="600">Slow — each row crosses JVM↔Python twice</text>

  <!-- ── Footer note ─────────────────────────────────────────────────── -->
  <text x="290" y="200" class="lbl muted" font-size="9.5" text-anchor="middle">
    Always prefer built-in functions. Use Pandas UDF when logic cannot be expressed with builtins. Avoid plain Python UDFs on large datasets.
  </text>
</svg>

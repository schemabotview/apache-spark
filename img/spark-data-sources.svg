<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 220" width="580" height="220">
  <defs>
    <style>
      .lbl { font-family: system-ui, sans-serif; }

      /* Light theme defaults */
      .bg         { fill: #f9f9f8; }
      .csv-fill   { fill: #f0fdf4; stroke: #86efac; }
      .csv-text   { fill: #166534; }
      .json-fill  { fill: #fff7ed; stroke: #fdba74; }
      .json-text  { fill: #9a3412; }
      .parquet-fill { fill: #eff6ff; stroke: #93c5fd; }
      .parquet-text { fill: #1e3a5f; }
      .orc-fill   { fill: #fdf4ff; stroke: #e879f9; }
      .orc-text   { fill: #86198f; }
      .delta-fill { fill: #f0fdfa; stroke: #5eead4; }
      .delta-text { fill: #134e4a; }
      .df-fill    { fill: #1e40af; stroke: #3b82f6; }
      .df-text    { fill: #ffffff; }
      .df-sub     { fill: #bfdbfe; }
      .arr        { stroke: #9b9b92; fill: none; }
      .arr-head   { fill: #9b9b92; stroke: none; }
      .lbl-read   { fill: #1d4ed8; }
      .lbl-write  { fill: #15803d; }
      .muted      { fill: #9b9b92; }

      /* Dark theme overrides */
      @media (prefers-color-scheme: dark) {
        .bg           { fill: #222220; }
        .csv-fill     { fill: #052e16; stroke: #16a34a; }
        .csv-text     { fill: #bbf7d0; }
        .json-fill    { fill: #431407; stroke: #fb923c; }
        .json-text    { fill: #fed7aa; }
        .parquet-fill { fill: #172554; stroke: #3b82f6; }
        .parquet-text { fill: #93c5fd; }
        .orc-fill     { fill: #2e1065; stroke: #c026d3; }
        .orc-text     { fill: #f0abfc; }
        .delta-fill   { fill: #042f2e; stroke: #2dd4bf; }
        .delta-text   { fill: #99f6e4; }
        .df-fill      { fill: #1e3a5f; stroke: #60a5fa; }
        .df-text      { fill: #bfdbfe; }
        .df-sub       { fill: #93c5fd; }
        .arr          { stroke: #6b6b65; fill: none; }
        .arr-head     { fill: #6b6b65; stroke: none; }
        .lbl-read     { fill: #60a5fa; }
        .lbl-write    { fill: #4ade80; }
        .muted        { fill: #6b6b65; }
      }
    </style>
    <marker id="arr-marker" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" class="arr-head" />
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="580" height="220" rx="10" />

  <!-- READ label -->
  <text class="lbl lbl-read" x="55" y="34" font-size="11" font-weight="600" text-anchor="middle">READ</text>

  <!-- WRITE label -->
  <text class="lbl lbl-write" x="525" y="34" font-size="11" font-weight="600" text-anchor="middle">WRITE</text>

  <!-- Left source boxes: x=10, width=90, heights=22, gap=8, starting y=50 -->
  <!-- CSV  y=50 -->
  <rect class="csv-fill" x="10" y="50" width="90" height="22" rx="4" stroke-width="1.5" />
  <text class="lbl csv-text" x="55" y="65" font-size="11" font-weight="600" text-anchor="middle">CSV</text>

  <!-- JSON y=80 -->
  <rect class="json-fill" x="10" y="80" width="90" height="22" rx="4" stroke-width="1.5" />
  <text class="lbl json-text" x="55" y="95" font-size="11" font-weight="600" text-anchor="middle">JSON</text>

  <!-- Parquet y=110 -->
  <rect class="parquet-fill" x="10" y="110" width="90" height="22" rx="4" stroke-width="1.5" />
  <text class="lbl parquet-text" x="55" y="125" font-size="11" font-weight="600" text-anchor="middle">Parquet</text>

  <!-- ORC y=140 -->
  <rect class="orc-fill" x="10" y="140" width="90" height="22" rx="4" stroke-width="1.5" />
  <text class="lbl orc-text" x="55" y="155" font-size="11" font-weight="600" text-anchor="middle">ORC</text>

  <!-- Delta Lake y=170 -->
  <rect class="delta-fill" x="10" y="170" width="90" height="22" rx="4" stroke-width="1.5" />
  <text class="lbl delta-text" x="55" y="185" font-size="11" font-weight="600" text-anchor="middle">Delta Lake</text>

  <!-- Center DataFrame box: x=210, width=160, y=72, height=76 -->
  <rect class="df-fill" x="210" y="72" width="160" height="76" rx="8" stroke-width="2" />
  <text class="lbl df-text" x="290" y="104" font-size="14" font-weight="700" text-anchor="middle">DataFrame</text>
  <text class="lbl df-sub" x="290" y="122" font-size="10" text-anchor="middle">schema + distributed rows</text>

  <!-- Right sink boxes: x=480, width=90, same layout -->
  <!-- CSV  y=50 -->
  <rect class="csv-fill" x="480" y="50" width="90" height="22" rx="4" stroke-width="1.5" />
  <text class="lbl csv-text" x="525" y="65" font-size="11" font-weight="600" text-anchor="middle">CSV</text>

  <!-- JSON y=80 -->
  <rect class="json-fill" x="480" y="80" width="90" height="22" rx="4" stroke-width="1.5" />
  <text class="lbl json-text" x="525" y="95" font-size="11" font-weight="600" text-anchor="middle">JSON</text>

  <!-- Parquet y=110 -->
  <rect class="parquet-fill" x="480" y="110" width="90" height="22" rx="4" stroke-width="1.5" />
  <text class="lbl parquet-text" x="525" y="125" font-size="11" font-weight="600" text-anchor="middle">Parquet</text>

  <!-- ORC y=140 -->
  <rect class="orc-fill" x="480" y="140" width="90" height="22" rx="4" stroke-width="1.5" />
  <text class="lbl orc-text" x="525" y="155" font-size="11" font-weight="600" text-anchor="middle">ORC</text>

  <!-- Delta Lake y=170 -->
  <rect class="delta-fill" x="480" y="170" width="90" height="22" rx="4" stroke-width="1.5" />
  <text class="lbl delta-text" x="525" y="185" font-size="11" font-weight="600" text-anchor="middle">Delta Lake</text>

  <!--
    Arrows: left boxes (right edge x=100) → DataFrame (left edge x=210)
    Box centers (y): CSV=61, JSON=91, Parquet=121, ORC=151, Delta=181
    DataFrame center y=110
    Bezier: from (100, boxY) control points fan into (210, 110)
  -->

  <!-- CSV → DataFrame -->
  <path class="arr" stroke-width="1.5" marker-end="url(#arr-marker)"
        d="M 100,61 C 155,61 155,110 210,110" />

  <!-- JSON → DataFrame -->
  <path class="arr" stroke-width="1.5" marker-end="url(#arr-marker)"
        d="M 100,91 C 155,91 155,110 210,110" />

  <!-- Parquet → DataFrame -->
  <path class="arr" stroke-width="1.5" marker-end="url(#arr-marker)"
        d="M 100,121 C 155,121 155,110 210,110" />

  <!-- ORC → DataFrame -->
  <path class="arr" stroke-width="1.5" marker-end="url(#arr-marker)"
        d="M 100,151 C 155,151 155,110 210,110" />

  <!-- Delta Lake → DataFrame -->
  <path class="arr" stroke-width="1.5" marker-end="url(#arr-marker)"
        d="M 100,181 C 155,181 155,110 210,110" />

  <!--
    Arrows: DataFrame (right edge x=370) → right boxes (left edge x=480)
    Box centers (y): CSV=61, JSON=91, Parquet=121, ORC=151, Delta=181
    DataFrame center y=110
  -->

  <!-- DataFrame → CSV -->
  <path class="arr" stroke-width="1.5" marker-end="url(#arr-marker)"
        d="M 370,110 C 425,110 425,61 480,61" />

  <!-- DataFrame → JSON -->
  <path class="arr" stroke-width="1.5" marker-end="url(#arr-marker)"
        d="M 370,110 C 425,110 425,91 480,91" />

  <!-- DataFrame → Parquet -->
  <path class="arr" stroke-width="1.5" marker-end="url(#arr-marker)"
        d="M 370,110 C 425,110 425,121 480,121" />

  <!-- DataFrame → ORC -->
  <path class="arr" stroke-width="1.5" marker-end="url(#arr-marker)"
        d="M 370,110 C 425,110 425,151 480,151" />

  <!-- DataFrame → Delta Lake -->
  <path class="arr" stroke-width="1.5" marker-end="url(#arr-marker)"
        d="M 370,110 C 425,110 425,181 480,181" />

  <!-- Footer -->
  <text class="lbl muted" x="290" y="212" font-size="9.5" text-anchor="middle">
    Same API regardless of format — only .format() and read options change
  </text>
</svg>

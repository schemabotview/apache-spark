<svg viewBox="0 0 600 272" width="600" height="272" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* ── Light ──────────────────────────────────────── */
      .bg            { fill: #f9f9f8; }
      .canvas-border { stroke: #e8e8e4; fill: none; }

      /* Driver */
      .driver-fill   { fill: #eeeeff; }
      .driver-stroke { stroke: #818cf8; }
      .driver-text   { fill: #3730a3; }
      .driver-sub    { fill: #6c63ff; }

      /* SparkContext inner box */
      .sc-fill   { fill: #c7d2fe; }
      .sc-stroke { stroke: #6c63ff; }
      .sc-text   { fill: #1e1b4b; }

      /* Cluster Manager */
      .cm-fill   { fill: #f1f5f9; }
      .cm-stroke { stroke: #cbd5e1; }
      .cm-text   { fill: #334155; }
      .cm-sub    { fill: #64748b; }

      /* Worker nodes */
      .wk-fill   { fill: #f0fdf4; }
      .wk-stroke { stroke: #86efac; }
      .wk-text   { fill: #166534; }

      /* Executor / Cache boxes */
      .ex-fill   { fill: #dcfce7; }
      .ex-stroke { stroke: #4ade80; }
      .ex-text   { fill: #14532d; }

      /* Task boxes */
      .tsk-fill   { fill: #bbf7d0; }
      .tsk-stroke { stroke: #22c55e; }
      .tsk-text   { fill: #052e16; }

      /* Arrows */
      .arr-stroke      { stroke: #9b9b92; fill: none; }
      .arr-head        { fill: #9b9b92; }
      .arr-blue        { stroke: #6c63ff; fill: none; }
      .arr-head-blue   { fill: #6c63ff; }

      .muted { fill: #9b9b92; }
      .lbl   { font-family: system-ui, sans-serif; }

      /* ── Dark ───────────────────────────────────────── */
      @media (prefers-color-scheme: dark) {
        .bg            { fill: #222220; }
        .canvas-border { stroke: #333330; }

        .driver-fill   { fill: #1e1b4b; }
        .driver-stroke { stroke: #818cf8; }
        .driver-text   { fill: #c7d2fe; }
        .driver-sub    { fill: #a5b4fc; }

        .sc-fill   { fill: #312e81; }
        .sc-stroke { stroke: #818cf8; }
        .sc-text   { fill: #e0e7ff; }

        .cm-fill   { fill: #2a2a27; }
        .cm-stroke { stroke: #484844; }
        .cm-text   { fill: #e2e8f0; }
        .cm-sub    { fill: #94a3b8; }

        .wk-fill   { fill: #052e16; }
        .wk-stroke { stroke: #16a34a; }
        .wk-text   { fill: #bbf7d0; }

        .ex-fill   { fill: #14532d; }
        .ex-stroke { stroke: #22c55e; }
        .ex-text   { fill: #dcfce7; }

        .tsk-fill   { fill: #166534; }
        .tsk-stroke { stroke: #4ade80; }
        .tsk-text   { fill: #f0fdf4; }

        .arr-stroke    { stroke: #6b6b65; fill: none; }
        .arr-head      { fill: #6b6b65; }
        .arr-blue      { stroke: #818cf8; fill: none; }
        .arr-head-blue { fill: #818cf8; }

        .muted { fill: #6b6b65; }
      }
    </style>
    <marker id="arr"      markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5 z" class="arr-head"/></marker>
    <marker id="arr-blue" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5 z" class="arr-head-blue"/></marker>
  </defs>

  <!-- Canvas -->
  <rect width="600" height="272" rx="10" class="bg canvas-border" stroke-width="1"/>

  <!-- ── Driver ─────────────────────────────────────── -->
  <rect x="12" y="70" width="132" height="132" rx="7" class="driver-fill driver-stroke" stroke-width="1.5"/>
  <text x="78" y="89" font-size="10" font-weight="700" text-anchor="middle" class="lbl driver-text">Driver Program</text>
  <!-- SparkContext inner box -->
  <rect x="22" y="98" width="112" height="52" rx="5" class="sc-fill sc-stroke" stroke-width="1.2"/>
  <text x="78" y="120" font-size="10" font-weight="700" text-anchor="middle" class="lbl sc-text">SparkContext</text>
  <text x="78" y="135" font-size="8.5" text-anchor="middle" class="lbl sc-text">/ SparkSession</text>
  <!-- Driver sub-labels -->
  <text x="78" y="163" font-size="8" text-anchor="middle" class="lbl driver-sub">DAG · Task Scheduler</text>
  <text x="78" y="176" font-size="8" text-anchor="middle" class="lbl driver-sub">Catalyst · your code</text>
  <text x="78" y="191" font-size="8" text-anchor="middle" class="lbl muted">runs your application</text>

  <!-- ── Cluster Manager ────────────────────────────── -->
  <rect x="200" y="108" width="144" height="56" rx="7" class="cm-fill cm-stroke" stroke-width="1.5"/>
  <text x="272" y="130" font-size="11" font-weight="700" text-anchor="middle" class="lbl cm-text">Cluster Manager</text>
  <text x="272" y="146" font-size="8.5" text-anchor="middle" class="lbl cm-sub">YARN · Kubernetes · Standalone</text>

  <!-- Driver ↔ Cluster Manager -->
  <line x1="144" y1="129" x2="200" y2="129" stroke-width="1.3" class="arr-stroke" marker-end="url(#arr)"/>
  <line x1="200" y1="143" x2="144" y2="143" stroke-width="1.3" class="arr-stroke" marker-end="url(#arr)"/>
  <text x="172" y="124" font-size="7.5" text-anchor="middle" class="lbl muted">request</text>
  <text x="172" y="153" font-size="7.5" text-anchor="middle" class="lbl muted">grant slots</text>

  <!-- ── Worker Node 1 ──────────────────────────────── -->
  <rect x="402" y="12" width="186" height="118" rx="7" class="wk-fill wk-stroke" stroke-width="1.5"/>
  <text x="495" y="30" font-size="10" font-weight="700" text-anchor="middle" class="lbl wk-text">Worker Node 1</text>
  <!-- Executor + Cache row -->
  <rect x="412" y="36" width="82" height="28" rx="4" class="ex-fill ex-stroke" stroke-width="1.1"/>
  <text x="453" y="54" font-size="9" font-weight="700" text-anchor="middle" class="lbl ex-text">Executor</text>
  <rect x="502" y="36" width="76" height="28" rx="4" class="ex-fill ex-stroke" stroke-width="1.1"/>
  <text x="540" y="54" font-size="9" font-weight="700" text-anchor="middle" class="lbl ex-text">Cache</text>
  <!-- Task row -->
  <rect x="412" y="72" width="80" height="24" rx="4" class="tsk-fill tsk-stroke" stroke-width="1"/>
  <text x="452" y="88" font-size="8.5" text-anchor="middle" class="lbl tsk-text">Task</text>
  <rect x="500" y="72" width="80" height="24" rx="4" class="tsk-fill tsk-stroke" stroke-width="1"/>
  <text x="540" y="88" font-size="8.5" text-anchor="middle" class="lbl tsk-text">Task</text>
  <text x="495" y="117" font-size="7.5" text-anchor="middle" class="lbl muted">1 task per partition</text>

  <!-- ── Worker Node 2 ──────────────────────────────── -->
  <rect x="402" y="148" width="186" height="118" rx="7" class="wk-fill wk-stroke" stroke-width="1.5"/>
  <text x="495" y="166" font-size="10" font-weight="700" text-anchor="middle" class="lbl wk-text">Worker Node 2</text>
  <!-- Executor + Cache row -->
  <rect x="412" y="172" width="82" height="28" rx="4" class="ex-fill ex-stroke" stroke-width="1.1"/>
  <text x="453" y="190" font-size="9" font-weight="700" text-anchor="middle" class="lbl ex-text">Executor</text>
  <rect x="502" y="172" width="76" height="28" rx="4" class="ex-fill ex-stroke" stroke-width="1.1"/>
  <text x="540" y="190" font-size="9" font-weight="700" text-anchor="middle" class="lbl ex-text">Cache</text>
  <!-- Task row -->
  <rect x="412" y="208" width="80" height="24" rx="4" class="tsk-fill tsk-stroke" stroke-width="1"/>
  <text x="452" y="224" font-size="8.5" text-anchor="middle" class="lbl tsk-text">Task</text>
  <rect x="500" y="208" width="80" height="24" rx="4" class="tsk-fill tsk-stroke" stroke-width="1"/>
  <text x="540" y="224" font-size="8.5" text-anchor="middle" class="lbl tsk-text">Task</text>
  <text x="495" y="253" font-size="7.5" text-anchor="middle" class="lbl muted">1 task per partition</text>

  <!-- ── Curved arrows: Driver → Worker 1 ──────────── -->
  <path d="M 144,104 C 240,38 320,38 402,55" stroke-width="1.3" stroke-dasharray="4,3" class="arr-blue" marker-end="url(#arr-blue)"/>
  <!-- Worker 1 → Driver -->
  <path d="M 402,75 C 320,90 240,108 144,122" stroke-width="1.3" class="arr-stroke" marker-end="url(#arr)"/>

  <!-- ── Curved arrows: Driver → Worker 2 ──────────── -->
  <path d="M 144,170 C 240,230 320,228 402,208" stroke-width="1.3" stroke-dasharray="4,3" class="arr-blue" marker-end="url(#arr-blue)"/>
  <!-- Worker 2 → Driver -->
  <path d="M 402,228 C 320,248 240,248 144,182" stroke-width="1.3" class="arr-stroke" marker-end="url(#arr)"/>

  <!-- Legend -->
  <line x1="14" y1="258" x2="38" y2="258" stroke-width="1.3" stroke-dasharray="4,3" class="arr-blue"/>
  <text x="44" y="262" font-size="7.5" class="lbl driver-sub">schedule tasks</text>
  <line x1="110" y1="258" x2="134" y2="258" stroke-width="1.3" class="arr-stroke"/>
  <text x="140" y="262" font-size="7.5" class="lbl muted">return results</text>
</svg>
